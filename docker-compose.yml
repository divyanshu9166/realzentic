services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-furniturecrm}
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c wal_compression=on
    # Map port for local dev
    #ports:
    # - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    # appendonly yes: persist queue data to disk so BullMQ jobs survive
    # a container restart. The volume below keeps the dump across deploys.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Run migrations on start (exits after completion)
  migrate:
    build:
      context: .
      target: builder
    command: >
      sh -c "npx prisma migrate deploy --schema ./prisma/schema.prisma"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-furniturecrm}"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-furniturecrm}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      SESSION_SECRET: "${SESSION_SECRET}"
      NEXT_PUBLIC_APP_URL: "https://${DOMAIN:-realzentic.autozentic.com}"
      CRM_API_SECRET: "${CRM_API_SECRET}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      LIVEKIT_URL: "${LIVEKIT_URL}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      OUTBOUND_SIP_TRUNK_ID: "${OUTBOUND_SIP_TRUNK_ID}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      REDIS_URL: "redis://redis:6379"
      # Socket.io gateway URL — consumed by socket.io-client in the browser
      NEXT_PUBLIC_WS_URL: "https://${DOMAIN:-realzentic.autozentic.com}:3001"
      # Images stored on VPS local volume — no cloud storage needed
      UPLOAD_DIR: "/app/uploads"
      # AI / STT / TTS providers
      DEEPGRAM_API_KEY: "${DEEPGRAM_API_KEY}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GROQ_MODEL: "${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}"
      LLM_PROVIDER: "${LLM_PROVIDER:-groq}"
      AI_AGENT_NAME: "${AI_AGENT_NAME:-anushka}"
      SARVAM_API_KEY: "${SARVAM_API_KEY}"
      TTS_PROVIDER: "${TTS_PROVIDER:-sarvam}"
      SARVAM_TTS_LANGUAGE: "${SARVAM_TTS_LANGUAGE:-hi-IN}"
      SARVAM_TTS_MODEL: "${SARVAM_TTS_MODEL:-bulbul:v3}"
      SARVAM_TTS_SPEAKER: "${SARVAM_TTS_SPEAKER:-pooja}"
      SARVAM_TTS_TRANSPORT: "${SARVAM_TTS_TRANSPORT:-streaming}"
      SARVAM_TTS_PACE: "${SARVAM_TTS_PACE:-1.03}"
      SARVAM_TTS_TEMPERATURE: "${SARVAM_TTS_TEMPERATURE:-0.55}"
      SARVAM_TTS_MIN_BUFFER_SIZE: "${SARVAM_TTS_MIN_BUFFER_SIZE:-40}"
      SARVAM_TTS_MAX_CHUNK_LENGTH: "${SARVAM_TTS_MAX_CHUNK_LENGTH:-120}"
      # SIP / Telephony
      VOBIZ_SIP_TRUNK_ID: "${VOBIZ_SIP_TRUNK_ID}"
      INBOUND_SIP_TRUNK_ID: "${INBOUND_SIP_TRUNK_ID}"
      DEFAULT_TRANSFER_NUMBER: "${DEFAULT_TRANSFER_NUMBER}"
      VOBIZ_SIP_DOMAIN: "${VOBIZ_SIP_DOMAIN}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/auth/me" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Lightweight WebSocket gateway: subscribes to Redis Pub/Sub and
  # pushes events to authenticated browser clients via socket.io.
  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
      SESSION_SECRET: "${SESSION_SECRET}"
      # Allowlist the CRM origin so socket.io CORS doesn't block connections.
      CORS_ORIGIN: "https://${DOMAIN:-realzentic.autozentic.com}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python AI Agent for Call Centre
  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  uploads:
